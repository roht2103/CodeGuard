server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codeguard}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=${JWT_SECRET:my-very-secret-key-which-is-at-least-256-bits-long-for-hs256-algorithm-to-work-properly}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.github.token=${GITHUB_TOKEN:}
